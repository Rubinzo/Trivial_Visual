<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Inicio.css">
</head>
<body>
    <div id="contenedor">
        <div id="registrarse">
            <p class="texto">Registrarse</p>
            <div class="inputs">
                <p>Nombre</p>
                <input type="text" placeholder="Escribe tu nombre" class="nombre" id="nombre1">
                <p>DNI</p>
                <input type="text" placeholder="Escribe tu dni" id="dni">
                <p>Apellido</p>
                <input type="text" placeholder="Escribe tu apellido" id="apellido">
                <p>Edad</p>
                <input type="text" placeholder="Escribe tu edad" id="edad">
                <p>Email</p>
                <input type="text" placeholder="Escribe tu email" id="email1">
                <p>Contraseña</p>
                <input type="password" placeholder="Esribe tu Contraseña" class="contraseña" id="contraseña1">
                <p>Confirma tu contraseña</p>
                <input type="password" placeholder="Escribe tu contraseña" class="contraseña2" id="contraseña2">
                
            </div>
            <button id="boton1">Enviar</button>
        </div>
        <div id="iniciarSesion">
            <p class="texto">Iniciar sesión</p>
            <div class="inputs" id="inputsSesion">
                <p>Email</p>
                <input type="text" placeholder="Escribe tu nombre" class="nombre" id="email2">
                <p>Contraseña</p>
                <input type="password" placeholder="Esribe tu Contraseña" class="contraseña" id="contraseña3">
            </div>
            <button id="boton2">Enviar</button>
        </div>
    </div>
    <script src="Inicio.js"></script>
</body>
</html>
